<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vater & Sohn Koop – 2.5D</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.5/peerjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(180deg, #dde8f4 0%, #edf3f8 100%);
      color: #162132;
      text-align: center;
      user-select: none;
      -webkit-user-select: none;
    }
    .panel {
      max-width: 560px;
      margin: 0 auto;
      padding: 12px;
    }
    h1 {
      font-size: 25px;
      margin: 10px 8px 4px;
    }
    .mission {
      margin: 0 12px 10px;
      font-weight: 700;
      font-size: 15px;
    }
    button, input {
      font-size: 17px;
      padding: 11px 14px;
      margin: 5px;
      border-radius: 14px;
      border: 2px solid #162132;
      background: white;
    }
    button {
      font-weight: 700;
      cursor: pointer;
    }
    input {
      width: min(90vw, 320px);
      text-align: center;
    }
    #status {
      min-height: 48px;
      padding: 8px;
      font-size: 16px;
    }
    .top-actions {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    #resetButton {
      background: #fff7ed;
    }
    #qrcode {
      display: none;
      justify-content: center;
      align-items: center;
      margin: 8px auto 12px;
      min-height: 220px;
      flex-direction: column;
      gap: 8px;
    }
    #qrcode canvas, #qrcode img {
      background: white;
      padding: 10px;
      border-radius: 14px;
      border: 2px solid #162132;
      width: 210px;
      height: 210px;
    }
    .join-link {
      display: block;
      font-size: 14px;
      word-break: break-all;
      color: #162132;
      max-width: 92vw;
    }
    canvas#game {
      width: min(95vw, 520px);
      height: auto;
      max-height: 58vh;
      background: linear-gradient(180deg, #dceafd 0%, #ffffff 55%);
      border: 4px solid #162132;
      border-radius: 18px;
      touch-action: none;
      box-shadow: 0 10px 20px rgba(0,0,0,0.12);
    }
    #controls {
      margin: 12px auto 18px;
    }
    #controls button {
      width: 82px;
      height: 58px;
      font-size: 26px;
      background: #ffffff;
    }
    .small {
      font-size: 14px;
      opacity: 0.82;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Vater & Sohn Koop – 2.5D</h1>
    <p class="mission">Level 1: Beide Schalter aktivieren → Tor öffnen → gemeinsam auf die goldene Zielplattform!</p>

    <div class="top-actions">
      <button id="hostButton">Ich bin Vater / Host</button>
      <button id="resetButton">Level neu starten</button>
    </div>
    <div>
      <input id="peerIdInput" placeholder="Host-ID vom Vater eingeben" autocomplete="off" />
      <button id="joinButton">Ich bin Sohn / Verbinden</button>
    </div>

    <p id="status">Noch nicht verbunden.</p>
    <div id="qrcode"></div>

    <canvas id="game" width="520" height="460"></canvas>

    <div id="controls">
      <div><button data-dx="0" data-dy="-14">⬆️</button></div>
      <div>
        <button data-dx="-14" data-dy="0">⬅️</button>
        <button data-dx="14" data-dy="0">➡️</button>
      </div>
      <div><button data-dx="0" data-dy="14">⬇️</button></div>
    </div>

    <div class="small">
      Vater = blauer Zylinder · Sohn = orange Pyramide<br />
      Das rote Tor blockiert den Weg, bis beide gleichzeitig auf ihren Feldern stehen.
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const statusText = document.getElementById("status");
    const qrContainer = document.getElementById("qrcode");
    const hostButton = document.getElementById("hostButton");
    const joinButton = document.getElementById("joinButton");
    const resetButton = document.getElementById("resetButton");
    const peerIdInput = document.getElementById("peerIdInput");

    let peer = null;
    let conn = null;
    let role = "";
    let levelDone = false;

    const world = {
      width: 340,
      height: 280,
      originX: 260,
      originY: 82,
      scaleX: 1.05,
      scaleY: 0.56
    };

    const startPositions = {
      father: { x: 55, y: 222 },
      son: { x: 100, y: 222 }
    };

    const players = {
      father: { ...startPositions.father },
      son: { ...startPositions.son }
    };

    const level = {
      fatherSwitch: { x: 58, y: 58, w: 42, h: 42 },
      sonSwitch: { x: 240, y: 58, w: 42, h: 42 },
      door: { x: 145, y: 108, w: 50, h: 76 },
      goal: { x: 225, y: 200, w: 72, h: 52 },
      blocks: [
        { x: 0, y: 0, w: 340, h: 10 },
        { x: 0, y: 0, w: 10, h: 280 },
        { x: 330, y: 0, w: 10, h: 280 },
        { x: 0, y: 270, w: 340, h: 10 },
        { x: 116, y: 124, w: 24, h: 112 },
        { x: 201, y: 124, w: 24, h: 112 }
      ]
    };

    hostButton.addEventListener("click", startHost);
    joinButton.addEventListener("click", () => joinGame());
    resetButton.addEventListener("click", resetLevel);

    document.querySelectorAll("#controls button").forEach(button => {
      button.addEventListener("click", () => move(Number(button.dataset.dx), Number(button.dataset.dy)));
    });

    window.addEventListener("keydown", event => {
      const key = event.key.toLowerCase();
      if (key === "arrowup" || key === "w") move(0, -14);
      if (key === "arrowdown" || key === "s") move(0, 14);
      if (key === "arrowleft" || key === "a") move(-14, 0);
      if (key === "arrowright" || key === "d") move(14, 0);
    });

    window.addEventListener("load", () => {
      const params = new URLSearchParams(window.location.search);
      const joinId = params.get("join");
      if (joinId) {
        peerIdInput.value = joinId;
        setTimeout(() => joinGame(joinId), 500);
      }
      draw();
    });

    function startHost() {
      role = "father";
      qrContainer.innerHTML = "";
      qrContainer.style.display = "none";
      statusText.textContent = "Host wird gestartet ...";
      peer = new Peer();

      peer.on("open", id => {
        const cleanUrl = window.location.href.split("?")[0];
        const joinUrl = cleanUrl + "?join=" + encodeURIComponent(id);
        statusText.innerHTML = "Host-ID: <b>" + id + "</b><br>QR-Code mit dem zweiten iPad scannen.";
        showQrCode(joinUrl);
      });

      peer.on("connection", connection => {
        conn = connection;
        setupConnection();
      });

      peer.on("error", error => {
        statusText.textContent = "Fehler beim Host: " + error.type;
      });
    }

    function showQrCode(joinUrl) {
      qrContainer.innerHTML = "";
      qrContainer.style.display = "flex";
      try {
        if (window.QRCode) {
          new QRCode(qrContainer, {
            text: joinUrl,
            width: 190,
            height: 190,
            correctLevel: QRCode.CorrectLevel.M
          });
        } else {
          throw new Error("QRCode library not loaded");
        }
      } catch (error) {
        const img = document.createElement("img");
        img.alt = "QR-Code zum Verbinden";
        img.src = "https://api.qrserver.com/v1/create-qr-code/?size=210x210&data=" + encodeURIComponent(joinUrl);
        qrContainer.appendChild(img);
      }
      const link = document.createElement("a");
      link.className = "join-link";
      link.href = joinUrl;
      link.textContent = "Falls der Scan nicht klappt: Link antippen/kopieren";
      qrContainer.appendChild(link);
    }

    function joinGame(optionalHostId) {
      const hostId = optionalHostId || peerIdInput.value.trim();
      if (!hostId) {
        statusText.textContent = "Bitte zuerst die Host-ID eingeben oder QR-Code scannen.";
        return;
      }
      role = "son";
      qrContainer.innerHTML = "";
      qrContainer.style.display = "none";
      statusText.textContent = "Verbinde mit Host ...";
      peer = new Peer();
      peer.on("open", () => {
        conn = peer.connect(hostId, { reliable: true });
        setupConnection();
      });
      peer.on("error", error => {
        statusText.textContent = "Fehler beim Verbinden: " + error.type;
      });
    }

    function setupConnection() {
      conn.on("open", () => {
        qrContainer.innerHTML = "";
        qrContainer.style.display = "none";
        statusText.textContent = "Verbunden! Aktiviert beide Schalter und lauft dann ins Ziel.";
        sendState();
      });
      conn.on("data", data => {
        if (data.type === "state") {
          players.father = data.players.father;
          players.son = data.players.son;
          levelDone = data.levelDone || false;
          draw();
        }
      });
      conn.on("close", () => { statusText.textContent = "Verbindung getrennt."; });
      conn.on("error", () => { statusText.textContent = "Verbindungsfehler."; });
    }

    function resetLevel() {
      players.father = { ...startPositions.father };
      players.son = { ...startPositions.son };
      levelDone = false;
      statusText.textContent = conn && conn.open
        ? "Level neu gestartet. Wieder beide Schalter aktivieren!"
        : "Level neu gestartet.";
      draw();
      sendState();
    }

    function move(dx, dy) {
      if (!role) {
        statusText.textContent = "Starte zuerst als Vater oder verbinde dich als Sohn.";
        return;
      }

      if (levelDone) {
        statusText.textContent = "Level schon geschafft – nutze 'Level neu starten'.";
        return;
      }

      const player = role === "father" ? players.father : players.son;
      const oldX = player.x;
      const oldY = player.y;

      player.x = clamp(player.x + dx, 18, world.width - 18);
      player.y = clamp(player.y + dy, 18, world.height - 18);

      if (hitsSolid(player)) {
        player.x = oldX;
        player.y = oldY;
      }

      if (bothPlayersInGoal()) {
        levelDone = true;
        statusText.textContent = "Level geschafft! Sehr stark – ihr habt es gemeinsam gelöst.";
      } else if (isDoorOpen()) {
        statusText.textContent = "Tor offen! Jetzt gemeinsam auf die Zielplattform.";
      }

      draw();
      sendState();
    }

    function sendState() {
      if (conn && conn.open) {
        conn.send({ type: "state", players: players, levelDone: levelDone });
      }
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function playerRect(player) {
      return { x: player.x - 14, y: player.y - 14, w: 28, h: 28 };
    }

    function rectsOverlap(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function isOnSwitch(player, sw) {
      return rectsOverlap(playerRect(player), sw);
    }

    function isDoorOpen() {
      return isOnSwitch(players.father, level.fatherSwitch) && isOnSwitch(players.son, level.sonSwitch);
    }

    function hitsSolid(player) {
      const pRect = playerRect(player);
      for (const block of level.blocks) {
        if (rectsOverlap(pRect, block)) return true;
      }
      if (!isDoorOpen() && rectsOverlap(pRect, level.door)) return true;
      return false;
    }

    function isInGoal(player) {
      return rectsOverlap(playerRect(player), level.goal);
    }

    function bothPlayersInGoal() {
      return isInGoal(players.father) && isInGoal(players.son);
    }

    function iso(x, y, z = 0) {
      return {
        x: world.originX + (x - y) * world.scaleX,
        y: world.originY + (x + y) * world.scaleY - z
      };
    }

    function drawIsoTile(x, y, w, h, topColor, leftColor, rightColor, height = 0, stroke = "#22304a") {
      const p1 = iso(x, y, height);
      const p2 = iso(x + w, y, height);
      const p3 = iso(x + w, y + h, height);
      const p4 = iso(x, y + h, height);
      const p1b = iso(x, y, 0);
      const p2b = iso(x + w, y, 0);
      const p3b = iso(x + w, y + h, 0);
      const p4b = iso(x, y + h, 0);

      if (height > 0) {
        ctx.beginPath();
        ctx.moveTo(p4.x, p4.y);
        ctx.lineTo(p3.x, p3.y);
        ctx.lineTo(p3b.x, p3b.y);
        ctx.lineTo(p4b.x, p4b.y);
        ctx.closePath();
        ctx.fillStyle = rightColor;
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p4.x, p4.y);
        ctx.lineTo(p4b.x, p4b.y);
        ctx.lineTo(p1b.x, p1b.y);
        ctx.closePath();
        ctx.fillStyle = leftColor;
        ctx.fill();
      }

      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.lineTo(p3.x, p3.y);
      ctx.lineTo(p4.x, p4.y);
      ctx.closePath();
      ctx.fillStyle = topColor;
      ctx.fill();
      ctx.strokeStyle = stroke;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function drawFloor() {
      drawIsoTile(0, 0, world.width, world.height, "#d8e6c8", "#bdd09d", "#a9c086", 0);

      for (let x = 0; x < world.width; x += 34) {
        for (let y = 0; y < world.height; y += 34) {
          const p1 = iso(x, y);
          const p2 = iso(x + 34, y);
          const p3 = iso(x + 34, y + 34);
          const p4 = iso(x, y + 34);
          ctx.beginPath();
          ctx.moveTo(p1.x, p1.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.lineTo(p3.x, p3.y);
          ctx.lineTo(p4.x, p4.y);
          ctx.closePath();
          ctx.strokeStyle = "rgba(22,33,50,0.11)";
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }
    }

    function shade(hex, amount) {
      const color = hex.replace("#", "");
      const num = parseInt(color, 16);
      const r = Math.max(0, Math.min(255, (num >> 16) + amount));
      const g = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amount));
      const b = Math.max(0, Math.min(255, (num & 0x0000FF) + amount));
      return `rgb(${r},${g},${b})`;
    }

    function drawSwitch(sw, label, active, color) {
      drawIsoTile(sw.x, sw.y, sw.w, sw.h, active ? color : "#d7dde7", active ? shade(color, -30) : "#bbc4d2", active ? shade(color, -15) : "#c7ced9", 10);
      const p = iso(sw.x + sw.w / 2, sw.y + sw.h / 2, 14);
      ctx.fillStyle = "#162132";
      ctx.font = "14px system-ui";
      ctx.fillText(label, p.x - 22, p.y + 34);
    }

    function drawBlock(block, colorTop, colorLeft, colorRight, height = 26) {
      drawIsoTile(block.x, block.y, block.w, block.h, colorTop, colorLeft, colorRight, height);
    }

    function drawDoor(open) {
      if (open) return;
      drawIsoTile(level.door.x, level.door.y, level.door.w, level.door.h, "#f87171", "#dc2626", "#ef4444", 42, "#4b1111");
      const textPos = iso(level.door.x + 12, level.door.y + level.door.h / 2, 50);
      ctx.fillStyle = "white";
      ctx.font = "bold 14px system-ui";
      ctx.fillText("TOR", textPos.x - 4, textPos.y + 4);
    }

    function drawGoal() {
      drawIsoTile(level.goal.x, level.goal.y, level.goal.w, level.goal.h,
        levelDone ? "#fcd34d" : "#fde68a",
        levelDone ? "#d97706" : "#f59e0b",
        levelDone ? "#f59e0b" : "#fbbf24",
        8);
      const p = iso(level.goal.x + 14, level.goal.y + 22, 12);
      ctx.fillStyle = "#162132";
      ctx.font = "bold 15px system-ui";
      ctx.fillText(levelDone ? "GEWONNEN" : "ZIEL", p.x, p.y + 4);
    }

    function drawCylinderPlayer(player, colorMain, colorSide, label) {
      const base = iso(player.x, player.y);
      const top = iso(player.x, player.y, 26);
      ctx.beginPath();
      ctx.ellipse(base.x, base.y + 2, 17, 9, 0, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(0,0,0,0.18)";
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(base.x - 14, base.y);
      ctx.lineTo(top.x - 14, top.y);
      ctx.quadraticCurveTo(top.x, top.y + 6, top.x + 14, top.y);
      ctx.lineTo(base.x + 14, base.y);
      ctx.quadraticCurveTo(base.x, base.y + 8, base.x - 14, base.y);
      ctx.closePath();
      ctx.fillStyle = colorSide;
      ctx.fill();

      ctx.beginPath();
      ctx.ellipse(top.x, top.y, 14, 8, 0, 0, Math.PI * 2);
      ctx.fillStyle = colorMain;
      ctx.fill();
      ctx.strokeStyle = "#162132";
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillStyle = "#162132";
      ctx.font = "14px system-ui";
      ctx.fillText(label, top.x - 18, top.y - 16);
    }

    function drawPyramidPlayer(player, colorMain, colorLeft, colorRight, label) {
      const base = iso(player.x, player.y);
      const apex = iso(player.x, player.y, 34);
      const left = iso(player.x - 12, player.y + 10, 0);
      const right = iso(player.x + 12, player.y + 10, 0);
      const front = iso(player.x, player.y + 22, 0);

      ctx.beginPath();
      ctx.ellipse(base.x, base.y + 4, 17, 9, 0, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(0,0,0,0.18)";
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(apex.x, apex.y);
      ctx.lineTo(left.x, left.y);
      ctx.lineTo(front.x, front.y);
      ctx.closePath();
      ctx.fillStyle = colorLeft;
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(apex.x, apex.y);
      ctx.lineTo(front.x, front.y);
      ctx.lineTo(right.x, right.y);
      ctx.closePath();
      ctx.fillStyle = colorRight;
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(apex.x, apex.y);
      ctx.lineTo(left.x, left.y);
      ctx.lineTo(right.x, right.y);
      ctx.closePath();
      ctx.fillStyle = colorMain;
      ctx.fill();
      ctx.strokeStyle = "#162132";
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillStyle = "#162132";
      ctx.font = "14px system-ui";
      ctx.fillText(label, apex.x - 16, apex.y - 16);
    }

    function drawHudText() {
      ctx.fillStyle = "rgba(255,255,255,0.72)";
      ctx.fillRect(15, 12, 490, 38);
      ctx.strokeStyle = "rgba(22,33,50,0.2)";
      ctx.strokeRect(15, 12, 490, 38);
      ctx.fillStyle = "#162132";
      ctx.font = "bold 16px system-ui";
      let text = "Beide Schalter gleichzeitig aktivieren!";
      if (isDoorOpen() && !levelDone) text = "Tor offen! Jetzt gemeinsam zur goldenen Plattform.";
      if (levelDone) text = "Geschafft! Nutzt 'Level neu starten' für eine neue Runde.";
      ctx.fillText(text, 26, 36);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const fatherOn = isOnSwitch(players.father, level.fatherSwitch);
      const sonOn = isOnSwitch(players.son, level.sonSwitch);
      const doorOpen = isDoorOpen();

      drawFloor();
      drawSwitch(level.fatherSwitch, "Vater", fatherOn, "#60a5fa");
      drawSwitch(level.sonSwitch, "Sohn", sonOn, "#fb923c");
      drawGoal();

      for (const block of level.blocks) {
        drawBlock(block, "#cbd5e1", "#94a3b8", "#a8b5c6", 24);
      }

      drawDoor(doorOpen);

      const entities = [
        { type: "father", depth: players.father.x + players.father.y },
        { type: "son", depth: players.son.x + players.son.y }
      ].sort((a, b) => a.depth - b.depth);

      for (const entity of entities) {
        if (entity.type === "father") {
          drawCylinderPlayer(players.father, "#3b82f6", "#1d4ed8", "Vater");
        } else {
          drawPyramidPlayer(players.son, "#fb923c", "#ea580c", "#f97316", "Sohn");
        }
      }

      drawHudText();
    }
  </script>
</body>
</html>
