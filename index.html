<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vater & Sohn Koop - Level 1</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.5/peerjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #eef2f7;
      color: #172033;
      text-align: center;
      user-select: none;
      -webkit-user-select: none;
    }
    h1 { font-size: 24px; margin: 16px 8px 4px; }
    .mission { font-weight: 700; margin: 0 8px 8px; }
    .panel { max-width: 520px; margin: 0 auto; padding: 10px; }
    button, input {
      font-size: 17px;
      padding: 11px 14px;
      margin: 5px;
      border-radius: 12px;
      border: 2px solid #172033;
      background: white;
    }
    button { font-weight: 700; cursor: pointer; }
    input { width: min(90vw, 320px); text-align: center; }
    #status { min-height: 48px; padding: 8px; font-size: 16px; }
    #qrcode {
      display: none;
      justify-content: center;
      align-items: center;
      margin: 8px auto 12px;
      min-height: 220px;
      flex-direction: column;
      gap: 8px;
    }
    #qrcode canvas, #qrcode img {
      background: white;
      padding: 10px;
      border-radius: 14px;
      border: 2px solid #172033;
      width: 210px;
      height: 210px;
    }
    .join-link {
      display: block;
      font-size: 14px;
      word-break: break-all;
      color: #172033;
      max-width: 92vw;
    }
    canvas#game {
      width: min(92vw, 420px);
      height: min(92vw, 420px);
      max-height: 48vh;
      background: #ffffff;
      border: 4px solid #172033;
      border-radius: 18px;
      touch-action: none;
    }
    #controls { margin: 10px auto 18px; }
    #controls button {
      width: 78px;
      height: 58px;
      font-size: 26px;
      background: #ffffff;
    }
    .small { font-size: 14px; opacity: 0.8; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Vater & Sohn Koop</h1>
    <p class="mission">Level 1: Beide Schalter drücken → Tür öffnet → gemeinsam ins Ziel!</p>

    <button id="hostButton">Ich bin Vater / Host</button>
    <br />
    <input id="peerIdInput" placeholder="Host-ID vom Vater eingeben" autocomplete="off" />
    <button id="joinButton">Ich bin Sohn / Verbinden</button>

    <p id="status">Noch nicht verbunden.</p>
    <div id="qrcode"></div>

    <canvas id="game" width="420" height="420"></canvas>

    <div id="controls">
      <div><button data-dx="0" data-dy="-12">⬆️</button></div>
      <div>
        <button data-dx="-12" data-dy="0">⬅️</button>
        <button data-dx="12" data-dy="0">➡️</button>
      </div>
      <div><button data-dx="0" data-dy="12">⬇️</button></div>
    </div>

    <div class="small">
      Vater = blauer Kreis · Sohn = oranges Dreieck<br />
      Der rote Balken ist die Tür. Sie öffnet sich nur bei Teamarbeit.
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const statusText = document.getElementById("status");
    const qrContainer = document.getElementById("qrcode");
    const hostButton = document.getElementById("hostButton");
    const joinButton = document.getElementById("joinButton");
    const peerIdInput = document.getElementById("peerIdInput");

    let peer = null;
    let conn = null;
    let role = "";
    let levelDone = false;

    const players = {
      father: { x: 70, y: 330 },
      son: { x: 120, y: 330 }
    };

    const level = {
      fatherSwitch: { x: 80, y: 95, r: 25 },
      sonSwitch: { x: 340, y: 95, r: 25 },
      door: { x: 185, y: 185, w: 50, h: 110 },
      goal: { x: 302, y: 300, w: 82, h: 72 }
    };

    hostButton.addEventListener("click", startHost);
    joinButton.addEventListener("click", () => joinGame());

    document.querySelectorAll("#controls button").forEach(button => {
      button.addEventListener("click", () => move(Number(button.dataset.dx), Number(button.dataset.dy)));
    });

    window.addEventListener("keydown", event => {
      const key = event.key.toLowerCase();
      if (key === "arrowup" || key === "w") move(0, -12);
      if (key === "arrowdown" || key === "s") move(0, 12);
      if (key === "arrowleft" || key === "a") move(-12, 0);
      if (key === "arrowright" || key === "d") move(12, 0);
    });

    window.addEventListener("load", () => {
      const params = new URLSearchParams(window.location.search);
      const joinId = params.get("join");
      if (joinId) {
        peerIdInput.value = joinId;
        setTimeout(() => joinGame(joinId), 500);
      }
    });

    function startHost() {
      role = "father";
      qrContainer.innerHTML = "";
      qrContainer.style.display = "none";
      statusText.textContent = "Host wird gestartet ...";
      peer = new Peer();

      peer.on("open", id => {
        const cleanUrl = window.location.href.split("?")[0];
        const joinUrl = cleanUrl + "?join=" + encodeURIComponent(id);
        statusText.innerHTML = "Host-ID: <b>" + id + "</b><br>QR-Code mit dem zweiten iPad scannen.";
        showQrCode(joinUrl);
      });

      peer.on("connection", connection => {
        conn = connection;
        setupConnection();
      });

      peer.on("error", error => {
        statusText.textContent = "Fehler beim Host: " + error.type;
      });
    }

    function showQrCode(joinUrl) {
      qrContainer.innerHTML = "";
      qrContainer.style.display = "flex";
      try {
        if (window.QRCode) {
          new QRCode(qrContainer, { text: joinUrl, width: 190, height: 190, correctLevel: QRCode.CorrectLevel.M });
        } else {
          throw new Error("QRCode library not loaded");
        }
      } catch (error) {
        const img = document.createElement("img");
        img.alt = "QR-Code zum Verbinden";
        img.src = "https://api.qrserver.com/v1/create-qr-code/?size=210x210&data=" + encodeURIComponent(joinUrl);
        qrContainer.appendChild(img);
      }
      const link = document.createElement("a");
      link.className = "join-link";
      link.href = joinUrl;
      link.textContent = "Falls der Scan nicht klappt: Link antippen/kopieren";
      qrContainer.appendChild(link);
    }

    function joinGame(optionalHostId) {
      const hostId = optionalHostId || peerIdInput.value.trim();
      if (!hostId) {
        statusText.textContent = "Bitte zuerst die Host-ID eingeben oder QR-Code scannen.";
        return;
      }
      role = "son";
      qrContainer.innerHTML = "";
      qrContainer.style.display = "none";
      statusText.textContent = "Verbinde mit Host ...";
      peer = new Peer();
      peer.on("open", () => {
        conn = peer.connect(hostId, { reliable: true });
        setupConnection();
      });
      peer.on("error", error => {
        statusText.textContent = "Fehler beim Verbinden: " + error.type;
      });
    }

    function setupConnection() {
      conn.on("open", () => {
        qrContainer.innerHTML = "";
        qrContainer.style.display = "none";
        statusText.textContent = "Verbunden! Beide auf die Schalter, dann gemeinsam ins Ziel.";
        sendState();
      });
      conn.on("data", data => {
        if (data.type === "state") {
          players.father = data.players.father;
          players.son = data.players.son;
          levelDone = data.levelDone || false;
          draw();
        }
      });
      conn.on("close", () => { statusText.textContent = "Verbindung getrennt."; });
      conn.on("error", () => { statusText.textContent = "Verbindungsfehler."; });
    }

    function move(dx, dy) {
      if (!role) {
        statusText.textContent = "Starte zuerst als Vater oder verbinde dich als Sohn.";
        return;
      }
      const player = role === "father" ? players.father : players.son;
      const oldX = player.x;
      const oldY = player.y;
      player.x = clamp(player.x + dx, 24, canvas.width - 24);
      player.y = clamp(player.y + dy, 28, canvas.height - 28);

      if (!isDoorOpen() && collidesWithDoor(player)) {
        player.x = oldX;
        player.y = oldY;
      }

      if (bothPlayersInGoal()) {
        levelDone = true;
        statusText.textContent = "Level geschafft! Ihr seid beide im Ziel.";
      }

      draw();
      sendState();
    }

    function sendState() {
      if (conn && conn.open) conn.send({ type: "state", players: players, levelDone: levelDone });
    }

    function isOnSwitch(player, sw) {
      const dx = player.x - sw.x;
      const dy = player.y - sw.y;
      return Math.sqrt(dx * dx + dy * dy) < sw.r + 16;
    }

    function isDoorOpen() {
      return isOnSwitch(players.father, level.fatherSwitch) && isOnSwitch(players.son, level.sonSwitch);
    }

    function collidesWithDoor(player) {
      const d = level.door;
      return player.x + 20 > d.x && player.x - 20 < d.x + d.w && player.y + 20 > d.y && player.y - 20 < d.y + d.h;
    }

    function isInGoal(player) {
      const g = level.goal;
      return player.x > g.x && player.x < g.x + g.w && player.y > g.y && player.y < g.y + g.h;
    }

    function bothPlayersInGoal() {
      return isInGoal(players.father) && isInGoal(players.son);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function drawGrid() {
      ctx.strokeStyle = "#e2e8f0";
      ctx.lineWidth = 1;
      for (let i = 0; i <= canvas.width; i += 42) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
      }
    }

    function drawSwitch(sw, label, active) {
      ctx.beginPath();
      ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI * 2);
      ctx.fillStyle = active ? "#6ee7b7" : "#e5e7eb";
      ctx.fill();
      ctx.lineWidth = 3;
      ctx.strokeStyle = "#172033";
      ctx.stroke();
      ctx.fillStyle = "#172033";
      ctx.font = "15px system-ui";
      ctx.fillText(label, sw.x - 28, sw.y + 48);
    }

    function drawDoor(open) {
      const d = level.door;
      if (open) {
        ctx.fillStyle = "rgba(110, 231, 183, 0.25)";
        ctx.fillRect(d.x, d.y, d.w, d.h);
        ctx.strokeStyle = "#10b981";
        ctx.strokeRect(d.x, d.y, d.w, d.h);
        ctx.fillStyle = "#065f46";
        ctx.fillText("offen", d.x + 3, d.y - 8);
      } else {
        ctx.fillStyle = "#ef4444";
        ctx.fillRect(d.x, d.y, d.w, d.h);
        ctx.strokeStyle = "#172033";
        ctx.lineWidth = 3;
        ctx.strokeRect(d.x, d.y, d.w, d.h);
        ctx.fillStyle = "#172033";
        ctx.fillText("Tür", d.x + 10, d.y - 8);
      }
    }

    function drawGoal() {
      const g = level.goal;
      ctx.fillStyle = levelDone ? "#facc15" : "#dbeafe";
      ctx.fillRect(g.x, g.y, g.w, g.h);
      ctx.strokeStyle = "#172033";
      ctx.lineWidth = 3;
      ctx.strokeRect(g.x, g.y, g.w, g.h);
      ctx.fillStyle = "#172033";
      ctx.font = "18px system-ui";
      ctx.fillText(levelDone ? "GEWINN!" : "ZIEL", g.x + 13, g.y + 42);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid();
      const fatherOn = isOnSwitch(players.father, level.fatherSwitch);
      const sonOn = isOnSwitch(players.son, level.sonSwitch);
      const open = isDoorOpen();

      drawSwitch(level.fatherSwitch, "Vater", fatherOn);
      drawSwitch(level.sonSwitch, "Sohn", sonOn);
      drawGoal();
      drawDoor(open);

      ctx.fillStyle = "#172033";
      ctx.font = "15px system-ui";
      ctx.fillText(open ? "Tür offen! Lauft beide ins Ziel." : "Beide Schalter gleichzeitig drücken!", 80, 30);

      drawFather(players.father.x, players.father.y);
      drawSon(players.son.x, players.son.y);
    }

    function drawFather(x, y) {
      ctx.beginPath();
      ctx.arc(x, y, 22, 0, Math.PI * 2);
      ctx.fillStyle = "#2b6cff";
      ctx.fill();
      ctx.lineWidth = 3;
      ctx.strokeStyle = "#172033";
      ctx.stroke();
      ctx.fillStyle = "#172033";
      ctx.font = "16px system-ui";
      ctx.fillText("Vater", x - 22, y - 32);
    }

    function drawSon(x, y) {
      ctx.beginPath();
      ctx.moveTo(x, y - 28);
      ctx.lineTo(x - 25, y + 22);
      ctx.lineTo(x + 25, y + 22);
      ctx.closePath();
      ctx.fillStyle = "#ff9f1c";
      ctx.fill();
      ctx.lineWidth = 3;
      ctx.strokeStyle = "#172033";
      ctx.stroke();
      ctx.fillStyle = "#172033";
      ctx.font = "16px system-ui";
      ctx.fillText("Sohn", x - 19, y + 42);
    }

    draw();
  </script>
</body>
</html>
