<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Vater & Sohn Koop – Gartenrätsel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.5/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;background:#172033;color:#162132;text-align:center;user-select:none;-webkit-user-select:none;overflow-x:hidden}.panel{max-width:620px;margin:0 auto;padding:10px;background:linear-gradient(180deg,#dfeaf3,#f7fbff);min-height:100vh}h1{font-size:24px;margin:6px 8px 2px}.mission{margin:0 10px 8px;font-weight:700;font-size:14px}.top-actions{display:flex;justify-content:center;gap:6px;flex-wrap:wrap}button,input{font-size:16px;padding:10px 13px;margin:4px;border-radius:13px;border:2px solid #172033;background:white}button{font-weight:800}#resetButton{background:#fff7ed}#fullscreenButton{background:#e0f2fe}input{width:min(88vw,310px);text-align:center}#status{min-height:42px;margin:2px;padding:6px;font-size:15px}#qrcode{display:none;justify-content:center;align-items:center;margin:6px auto 10px;min-height:220px;flex-direction:column;gap:8px}#qrcode canvas,#qrcode img{background:white;padding:10px;border-radius:14px;border:2px solid #172033;width:210px;height:210px}.join-link{font-size:14px;word-break:break-all;color:#172033;max-width:92vw}#gameWrap{position:relative;margin:0 auto;width:min(96vw,600px)}canvas#game{width:100%;height:auto;max-height:61vh;background:#96b77b;border:4px solid #172033;border-radius:18px;touch-action:none;box-shadow:0 14px 28px rgba(0,0,0,.25)}#controls{margin:9px auto 14px}#controls button{width:82px;height:56px;font-size:25px;background:#fff}.small{font-size:13px;opacity:.82;margin-top:2px}.fullscreen .panel{max-width:none;padding:6px}.fullscreen h1,.fullscreen .mission,.fullscreen .small{display:none}.fullscreen canvas#game{max-height:72vh}
</style>
</head>
<body>
<div class="panel" id="panel">
<h1>Vater & Sohn Koop – Gartenrätsel</h1>
<p class="mission">Schiebt beide Steinblöcke auf die Druckplatten. Dann öffnet sich das Tor dauerhaft.</p>
<div class="top-actions"><button id="hostButton">Vater / Host</button><button id="resetButton">Level neu starten</button><button id="fullscreenButton">Vollbild</button></div>
<div><input id="peerIdInput" placeholder="Host-ID eingeben" autocomplete="off" /><button id="joinButton">Sohn / Verbinden</button></div>
<p id="status">Noch nicht verbunden.</p><div id="qrcode"></div>
<div id="gameWrap"><canvas id="game" width="600" height="480"></canvas></div>
<div id="controls"><div><button data-dx="0" data-dy="-12">⬆️</button></div><div><button data-dx="-12" data-dy="0">⬅️</button><button data-dx="12" data-dy="0">➡️</button></div><div><button data-dx="0" data-dy="12">⬇️</button></div></div>
<div class="small">Vater = blauer Zylinder · Sohn = orange Pyramide · Steinblöcke können geschoben werden</div>
</div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),statusText=document.getElementById('status'),qrContainer=document.getElementById('qrcode'),hostButton=document.getElementById('hostButton'),joinButton=document.getElementById('joinButton'),resetButton=document.getElementById('resetButton'),fullscreenButton=document.getElementById('fullscreenButton'),peerIdInput=document.getElementById('peerIdInput'),panel=document.getElementById('panel');
let peer=null,conn=null,role='',levelDone=false;
const world={width:390,height:300,originX:300,originY:60,scaleX:1.16,scaleY:.58};
const start={father:{x:75,y:244},son:{x:120,y:244},crates:[{x:78,y:155},{x:272,y:155}]};
const players={father:{...start.father},son:{...start.son}};let crates=start.crates.map(c=>({...c}));
const level={plates:[{x:62,y:68,w:46,h:46,label:'Vater'},{x:282,y:68,w:46,h:46,label:'Sohn'}],door:{x:168,y:94,w:54,h:86},goal:{x:246,y:220,w:82,h:54},blocks:[{x:0,y:0,w:390,h:12},{x:0,y:0,w:12,h:300},{x:378,y:0,w:12,h:300},{x:0,y:288,w:390,h:12},{x:128,y:122,w:28,h:128},{x:234,y:122,w:28,h:128},{x:128,y:122,w:48,h:22},{x:214,y:122,w:48,h:22},{x:54,y:195,w:70,h:20},{x:266,y:195,w:70,h:20}]};
hostButton.onclick=startHost;joinButton.onclick=()=>joinGame();resetButton.onclick=resetLevel;fullscreenButton.onclick=toggleFullscreen;document.querySelectorAll('#controls button').forEach(b=>b.onclick=()=>move(+b.dataset.dx,+b.dataset.dy));
window.addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(k==='arrowup'||k==='w')move(0,-12);if(k==='arrowdown'||k==='s')move(0,12);if(k==='arrowleft'||k==='a')move(-12,0);if(k==='arrowright'||k==='d')move(12,0);if(k==='f')toggleFullscreen()});
window.addEventListener('load',()=>{const j=new URLSearchParams(location.search).get('join');if(j){peerIdInput.value=j;setTimeout(()=>joinGame(j),500)}draw()});
function startHost(){role='father';qrContainer.innerHTML='';qrContainer.style.display='none';statusText.textContent='Host wird gestartet ...';peer=new Peer();peer.on('open',id=>{const u=location.href.split('?')[0]+'?join='+encodeURIComponent(id);statusText.innerHTML='Host-ID: <b>'+id+'</b><br>QR-Code mit zweitem iPad scannen.';showQrCode(u)});peer.on('connection',c=>{conn=c;setupConnection()});peer.on('error',e=>statusText.textContent='Fehler beim Host: '+e.type)}
function showQrCode(u){qrContainer.innerHTML='';qrContainer.style.display='flex';try{if(window.QRCode)new QRCode(qrContainer,{text:u,width:190,height:190,correctLevel:QRCode.CorrectLevel.M});else throw Error()}catch(e){const img=document.createElement('img');img.src='https://api.qrserver.com/v1/create-qr-code/?size=210x210&data='+encodeURIComponent(u);qrContainer.appendChild(img)}const a=document.createElement('a');a.className='join-link';a.href=u;a.textContent='Falls der Scan nicht klappt: Link antippen';qrContainer.appendChild(a)}
function joinGame(opt){const id=opt||peerIdInput.value.trim();if(!id){statusText.textContent='Bitte Host-ID eingeben oder QR-Code scannen.';return}role='son';qrContainer.innerHTML='';qrContainer.style.display='none';statusText.textContent='Verbinde mit Host ...';peer=new Peer();peer.on('open',()=>{conn=peer.connect(id,{reliable:true});setupConnection()});peer.on('error',e=>statusText.textContent='Fehler beim Verbinden: '+e.type)}
function setupConnection(){conn.on('open',()=>{qrContainer.innerHTML='';qrContainer.style.display='none';statusText.textContent='Verbunden! Schiebt beide Steine auf die Druckplatten.';sendState()});conn.on('data',d=>{if(d.type==='state'){players.father=d.players.father;players.son=d.players.son;crates=d.crates;levelDone=d.levelDone||false;draw()}});conn.on('close',()=>statusText.textContent='Verbindung getrennt.');conn.on('error',()=>statusText.textContent='Verbindungsfehler.')}
function resetLevel(){players.father={...start.father};players.son={...start.son};crates=start.crates.map(c=>({...c}));levelDone=false;statusText.textContent='Level neu gestartet. Schiebt die Steine auf die Platten.';draw();sendState()}
function toggleFullscreen(){if(!document.fullscreenElement){(panel.requestFullscreen||document.documentElement.requestFullscreen).call(panel).catch(()=>{});document.body.classList.add('fullscreen');fullscreenButton.textContent='Vollbild aus'}else{document.exitFullscreen();document.body.classList.remove('fullscreen');fullscreenButton.textContent='Vollbild'}}document.addEventListener('fullscreenchange',()=>{if(!document.fullscreenElement){document.body.classList.remove('fullscreen');fullscreenButton.textContent='Vollbild'}});
function move(dx,dy){if(!role){statusText.textContent='Starte als Vater oder verbinde dich als Sohn.';return}const p=role==='father'?players.father:players.son,old={x:p.x,y:p.y};p.x=clamp(p.x+dx,18,world.width-18);p.y=clamp(p.y+dy,18,world.height-18);let pushed=false;if(hitsWallOrDoor(p)){p.x=old.x;p.y=old.y}else{for(let i=0;i<crates.length;i++){if(rectsOverlap(playerRect(p),crateRect(crates[i]))){const oldC={...crates[i]};crates[i].x=clamp(crates[i].x+dx,18,world.width-18);crates[i].y=clamp(crates[i].y+dy,18,world.height-18);if(hitsCrateSolid(i)||rectsOverlap(crateRect(crates[i]),playerRect(otherPlayer()))){crates[i]=oldC;p.x=old.x;p.y=old.y}else pushed=true}}}if(bothPlayersInGoal()){levelDone=true;statusText.textContent='Level geschafft! Ihr habt das Tor mit den Steinen offen gehalten.'}else if(isDoorOpen())statusText.textContent='Tor offen. Jetzt beide zur goldenen Zielplattform!';else if(pushed)statusText.textContent='Gut! Schiebt beide Steine auf die leuchtenden Platten.';draw();sendState()}
function sendState(){if(conn&&conn.open)conn.send({type:'state',players,crates,levelDone})}function clamp(v,min,max){return Math.max(min,Math.min(max,v))}function playerRect(p){return{x:p.x-13,y:p.y-13,w:26,h:26}}function crateRect(c){return{x:c.x-15,y:c.y-15,w:30,h:30}}function rectsOverlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}function otherPlayer(){return role==='father'?players.son:players.father}
function plateWeighted(pl){return crates.some(c=>rectsOverlap(crateRect(c),pl))||rectsOverlap(playerRect(players.father),pl)||rectsOverlap(playerRect(players.son),pl)}function isDoorOpen(){return level.plates.every(plateWeighted)}function hitsWallOrDoor(p){const r=playerRect(p);for(const b of level.blocks)if(rectsOverlap(r,b))return true;if(!isDoorOpen()&&rectsOverlap(r,level.door))return true;return false}function hitsCrateSolid(i){const r=crateRect(crates[i]);for(const b of level.blocks)if(rectsOverlap(r,b))return true;if(!isDoorOpen()&&rectsOverlap(r,level.door))return true;for(let j=0;j<crates.length;j++)if(i!==j&&rectsOverlap(r,crateRect(crates[j])))return true;return false}function isInGoal(p){return rectsOverlap(playerRect(p),level.goal)}function bothPlayersInGoal(){return isInGoal(players.father)&&isInGoal(players.son)}function iso(x,y,z=0){return{x:world.originX+(x-y)*world.scaleX,y:world.originY+(x+y)*world.scaleY-z}}
function poly(points,fill,stroke='#1d2737',lw=1.5){ctx.beginPath();ctx.moveTo(points[0].x,points[0].y);for(let i=1;i<points.length;i++)ctx.lineTo(points[i].x,points[i].y);ctx.closePath();ctx.fillStyle=fill;ctx.fill();if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke()}}function tile(x,y,w,h,top,left,right,z=0,stroke='#22304a'){const p1=iso(x,y,z),p2=iso(x+w,y,z),p3=iso(x+w,y+h,z),p4=iso(x,y+h,z),b1=iso(x,y,0),b3=iso(x+w,y+h,0),b4=iso(x,y+h,0);if(z>0){poly([p4,p3,b3,b4],right,stroke);poly([p1,p4,b4,b1],left,stroke)}poly([p1,p2,p3,p4],top,stroke)}function shade(hex,a){const n=parseInt(hex.slice(1),16),r=Math.max(0,Math.min(255,(n>>16)+a)),g=Math.max(0,Math.min(255,((n>>8)&255)+a)),b=Math.max(0,Math.min(255,(n&255)+a));return`rgb(${r},${g},${b})`}
function drawGarden(){const grd=ctx.createLinearGradient(0,0,0,480);grd.addColorStop(0,'#9fc17d');grd.addColorStop(1,'#5f7f45');ctx.fillStyle=grd;ctx.fillRect(0,0,600,480);for(let i=0;i<90;i++){ctx.fillStyle=i%3?'rgba(32,77,33,.18)':'rgba(255,255,255,.10)';ctx.beginPath();ctx.arc((i*73)%600,(i*41)%480,2+(i%5),0,7);ctx.fill()}tile(0,0,world.width,world.height,'#c9b894','#9c8b68','#b2a27d',0,'rgba(36,40,45,.45)');for(let x=0;x<world.width;x+=30)for(let y=0;y<world.height;y+=30){const p=iso(x,y),q=iso(x+30,y),r=iso(x+30,y+30),s=iso(x,y+30);poly([p,q,r,s],`rgba(${185+(x+y)%25},${174+(x*y)%22},${142+(x+y)%18},.18)`,'rgba(70,65,55,.18)',.7)}drawPond();drawTrees();}
function drawTrees(){for(const t of[{x:35,y:35},{x:355,y:55},{x:44,y:268},{x:350,y:242},{x:10,y:150},{x:374,y:164}]){const p=iso(t.x,t.y,0);ctx.fillStyle='rgba(0,0,0,.18)';ctx.beginPath();ctx.ellipse(p.x,p.y+10,24,10,0,0,7);ctx.fill();ctx.fillStyle='#6b4f2a';ctx.fillRect(p.x-4,p.y-20,8,28);ctx.fillStyle='#315f2d';ctx.beginPath();ctx.arc(p.x,p.y-30,25,0,7);ctx.fill();ctx.fillStyle='#427a37';ctx.beginPath();ctx.arc(p.x-12,p.y-38,15,0,7);ctx.fill()}}
function drawPond(){const pts=[iso(18,216),iso(76,220),iso(94,260),iso(34,270)];poly(pts,'rgba(55,126,145,.75)','rgba(22,55,68,.6)',2);ctx.fillStyle='rgba(191,230,155,.9)';for(const a of[[40,242],[62,250],[73,232]]){const p=iso(a[0],a[1]);ctx.beginPath();ctx.ellipse(p.x,p.y,8,4,.3,0,7);ctx.fill()}}
function drawSwitch(pl,label,active){tile(pl.x,pl.y,pl.w,pl.h,active?'#7dd3fc':'#a7b2bd',active?'#0369a1':'#717a85',active?'#0ea5e9':'#88929c',8);const p=iso(pl.x+pl.w/2,pl.y+pl.h/2,12);ctx.fillStyle='#102033';ctx.font='bold 14px system-ui';ctx.fillText(label,p.x-23,p.y+32)}function drawBlock(b){tile(b.x,b.y,b.w,b.h,'#afa99d','#7c7469','#928a7d',28,'#514a43')}function drawDoor(){if(isDoorOpen()){const p=iso(level.door.x+5,level.door.y+35,8);ctx.fillStyle='#064e3b';ctx.font='bold 14px system-ui';ctx.fillText('TOR OFFEN',p.x-16,p.y);return}tile(level.door.x,level.door.y,level.door.w,level.door.h,'#5b3c22','#2b2117','#49301d',54,'#1a120c');const p=iso(level.door.x+12,level.door.y+38,60);ctx.fillStyle='#fef3c7';ctx.font='bold 15px system-ui';ctx.fillText('TOR',p.x-3,p.y)}function drawGoal(){tile(level.goal.x,level.goal.y,level.goal.w,level.goal.h,levelDone?'#facc15':'#fde68a','#d97706','#f59e0b',10);const p=iso(level.goal.x+16,level.goal.y+24,14);ctx.fillStyle='#172033';ctx.font='bold 15px system-ui';ctx.fillText(levelDone?'GEWONNEN':'ZIEL',p.x,p.y+4)}function drawCrate(c,i){tile(c.x-15,c.y-15,30,30,'#a16207','#713f12','#854d0e',24,'#3b260a');const p=iso(c.x-4,c.y+4,28);ctx.fillStyle='#fff7ed';ctx.font='bold 14px system-ui';ctx.fillText('☰',p.x,p.y)}
function drawFather(p){const b=iso(p.x,p.y),t=iso(p.x,p.y,28);ctx.fillStyle='rgba(0,0,0,.25)';ctx.beginPath();ctx.ellipse(b.x,b.y+2,16,8,0,0,7);ctx.fill();ctx.fillStyle='#1d4ed8';ctx.beginPath();ctx.moveTo(b.x-13,b.y);ctx.lineTo(t.x-13,t.y);ctx.quadraticCurveTo(t.x,t.y+7,t.x+13,t.y);ctx.lineTo(b.x+13,b.y);ctx.quadraticCurveTo(b.x,b.y+8,b.x-13,b.y);ctx.fill();ctx.beginPath();ctx.ellipse(t.x,t.y,14,8,0,0,7);ctx.fillStyle='#3b82f6';ctx.fill();ctx.strokeStyle='#0f172a';ctx.stroke();ctx.fillStyle='#0f172a';ctx.font='13px system-ui';ctx.fillText('Vater',t.x-17,t.y-14)}
function drawSon(p){const b=iso(p.x,p.y),a=iso(p.x,p.y,36),l=iso(p.x-13,p.y+11),r=iso(p.x+13,p.y+11),f=iso(p.x,p.y+23);ctx.fillStyle='rgba(0,0,0,.25)';ctx.beginPath();ctx.ellipse(b.x,b.y+4,17,8,0,0,7);ctx.fill();poly([a,l,f],'#ea580c',null);poly([a,f,r],'#f97316',null);poly([a,l,r],'#fb923c','#0f172a');ctx.fillStyle='#0f172a';ctx.font='13px system-ui';ctx.fillText('Sohn',a.x-15,a.y-14)}function drawHud(){ctx.fillStyle='rgba(255,255,255,.78)';ctx.fillRect(12,10,576,42);ctx.strokeStyle='rgba(15,23,42,.25)';ctx.strokeRect(12,10,576,42);ctx.fillStyle='#0f172a';ctx.font='bold 15px system-ui';let text='Schiebt die zwei Steinblöcke auf die leuchtenden Druckplatten.';if(isDoorOpen()&&!levelDone)text='Tor offen! Jetzt beide zur goldenen Zielplattform.';if(levelDone)text='Geschafft! Level neu starten für eine neue Runde.';ctx.fillText(text,22,36)}
function draw(){ctx.clearRect(0,0,600,480);drawGarden();level.plates.forEach((p,i)=>drawSwitch(p,i?'Sohn':'Vater',plateWeighted(p)));drawGoal();level.blocks.forEach(drawBlock);drawDoor();const ents=[...crates.map((c,i)=>({t:'crate',i,d:c.x+c.y})),{t:'father',d:players.father.x+players.father.y},{t:'son',d:players.son.x+players.son.y}].sort((a,b)=>a.d-b.d);for(const e of ents){if(e.t==='crate')drawCrate(crates[e.i],e.i);if(e.t==='father')drawFather(players.father);if(e.t==='son')drawSon(players.son)}drawHud()}
</script>
</body>
</html>
